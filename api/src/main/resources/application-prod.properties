spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.auth.cors.allowed-origins=${ALLOWED_ORIGINS}
app.user.default-user.username=${DEFAULT_USER_USERNAME}
app.user.default-user.password=${DEFAULT_USER_PASSWORD}
app.asset.root-directory=${ASSET_ROOT_DIRECTORY}
